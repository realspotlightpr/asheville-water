<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Asheville Water Specialists — licensed whole-home water filtration and softening for Western North Carolina. Free personalized water report, honest recommendations, no scare tactics." />
    <title>Asheville Water Specialists | Whole-Home Water Filtration in WNC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="gtranslate_wrapper"></div>
    <script>
      (() => {
        const languagePreference = document.cookie.match(
          /(?:^|;\s*)aws_language=(en|es)(?:;|$)/i
        )?.[1]?.toLowerCase();
        const hasSpanishTranslation = document.cookie
          .split(";")
          .some((cookie) => {
            const [name, ...valueParts] = cookie.trim().split("=");
            if (name.toLowerCase() !== "googtrans") return false;

            try {
              return decodeURIComponent(valueParts.join("=")).toLowerCase() === "/en/es";
            } catch {
              return false;
            }
          });

        if (languagePreference === "es" && !hasSpanishTranslation) {
          document.cookie = "googtrans=/en/es;path=/;max-age=31536000;SameSite=Lax";
        }

        window.gtranslateSettings = {
          default_language: "en",
          detect_browser_language: !languagePreference,
          languages: ["en", "es"],
          wrapper_selector: ".gtranslate_wrapper"
        };
      })();
    </script>
    <script
      src="https://cdn.gtranslate.net/widgets/latest/float.js"
      defer
    ></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
